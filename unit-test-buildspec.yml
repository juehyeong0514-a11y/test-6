version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo Using Node.js 20 for frontend checks
  pre_build:
    commands:
      - cd "$CODEBUILD_SRC_DIR/frontend"
      - npm install
  build:
    commands:
      - cd "$CODEBUILD_SRC_DIR/frontend"
      - npm run build
